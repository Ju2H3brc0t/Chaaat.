<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0f8ff;
      --card:     #ffffff;
      --accent:   #4a7fd4;
      --accent-h: #3568bc;
      --text:     #1a2540;
      --muted:    #7a8fad;
      --border:   #d4e2f4;
      --input-bg: #f7faff;
      --shadow:   0 8px 40px rgba(74,127,212,0.10);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(180,210,255,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 90% 90%, rgba(200,225,255,0.35) 0%, transparent 65%);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(74,127,212,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      position: relative;
      animation: rise 0.55s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #82b0f0);
      border-radius: 0 0 4px 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #82b0f0);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--text);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.85rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 32px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .input-wrap > svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      stroke: var(--muted); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke 0.2s;
      pointer-events: none;
    }

    input[type=text], input[type=password] {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type=text]::placeholder,
    input[type=password]::placeholder { color: #b0c2d8; }

    input[type=text]:focus,
    input[type=password]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,127,212,0.12);
      background: #fff;
    }

    .input-wrap:focus-within > svg { stroke: var(--accent); }

    .toggle-pw {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 2px;
      display: flex; align-items: center;
    }

    .toggle-pw svg {
      width: 17px; height: 17px;
      stroke: var(--muted); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke 0.2s;
    }

    .toggle-pw:hover svg { stroke: var(--accent); }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 4px 0 26px;
    }

    .remember {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; color: var(--muted);
      cursor: pointer; user-select: none;
    }

    .remember input[type=checkbox] {
      width: 15px; height: 15px;
      padding: 0; margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .forgot {
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot:hover { color: var(--accent-h); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(74,127,212,0.25);
    }

    .btn:hover {
      background: var(--accent-h);
      box-shadow: 0 6px 20px rgba(74,127,212,0.35);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    .divider span { font-size: 0.78rem; color: #c0d2e8; white-space: nowrap; }

    .signup {
      text-align: center;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .signup a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }

    .signup a:hover { color: var(--accent-h); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon" style="background: none;"> <img src="mon-logo.jpg" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="brand-name">Chaaat.</span>
    </div>

    <h1>Bon retour,<br><em>content de vous revoir.</em></h1>
    <p class="subtitle">Connectez-vous à votre espace personnel.</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="username">Nom d'utilisateur</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="votre_pseudo" autocomplete="username"/>
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Afficher le mot de passe">
            <svg id="eye-icon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox"/> Se souvenir de moi
        </label>
        <a href="#" class="forgot">Mot de passe oublié ?</a>
      </div>

      <button class="btn" type="submit" onclick="handleLogin()">Se connecter</button>
    </form>

  </div>

  <script>
    // Fonction pour afficher/masquer le mot de passe
    function togglePw() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    }

    // Fonction de connexion sécurisée par Hash
    async function handleLogin(event) {
      event.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      // On envoie les données au serveur (Backend)
      const response = await fetch('http://localhost:5000/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ 
            guild_id: "123456789", // L'ID du serveur concerné
            password: pass 
        })
    });

    if (response.ok) {
        window.location.href = "accueil.html";
      } else {
        alert("Accès refusé");
      }
    }
  </script>
</body>
</html>
