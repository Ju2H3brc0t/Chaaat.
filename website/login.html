<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Chaaat.</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f8ff;
      --card:    #ffffff;
      --accent:  #4a7fd4;
      --accent-h:#3568bc;
      --text:    #1a2540;
      --muted:   #7a8fad;
      --border:  #d4e2f4;
      --discord: #5865F2;
      --discord-h: #4752c4;
      --shadow:  0 8px 40px rgba(74,127,212,0.10);
    }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(180,210,255,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 90% 90%, rgba(200,225,255,0.35) 0%, transparent 65%);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(74,127,212,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: var(--shadow);
      position: relative;
      animation: rise 0.55s cubic-bezier(.22,.68,0,1.2) both;
      text-align: center;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }



    .brand {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 32px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #82b0f0);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--text); }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.85rem; font-weight: 400;
      letter-spacing: -0.02em; line-height: 1.2;
      margin-bottom: 8px;
    }
    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      font-size: 0.875rem; color: var(--muted);
      font-weight: 300; margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn-discord {
      width: 100%;
      padding: 14px 20px;
      background: var(--discord);
      color: #fff;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(88,101,242,0.35);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      text-decoration: none;
    }

    .btn-discord:hover {
      background: var(--discord-h);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(88,101,242,0.45);
    }

    .btn-discord:active { transform: translateY(0); }

    .btn-discord svg { width: 22px; height: 22px; flex-shrink: 0; }

    .footer-note {
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .footer-note a { color: var(--accent); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0 20px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    .perms {
      display: flex; flex-direction: column; gap: 8px;
      text-align: left;
    }

    .perm-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.82rem; color: var(--muted);
    }

    .perm-icon {
      width: 28px; height: 28px; flex-shrink: 0;
      background: rgba(74,127,212,0.08);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .perm-icon svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="brand-name">Chaaat.</span>
    </div>

    <h1>Welcome back,<br><em>glad to see you again.</em></h1>
    <p class="subtitle">Sign in with your Discord account to manage your server settings.</p>

    <a class="btn-discord" href="/login">
      <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      Sign in with Discord
    </a>

    <div class="divider"><span>What this site requests</span></div>

    <div class="perms">
      <div class="perm-row">
        <div class="perm-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <span>Your Discord username and avatar</span>
      </div>
      <div class="perm-row">
        <div class="perm-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <span>The list of servers where you are an administrator</span>
      </div>
    </div>

    <p class="footer-note">
      We do not store any passwords.<br/>
      <a href="https://discord.com/privacy" target="_blank">Discord Privacy Policy →</a>
    </p>
  </div>
</body>
</html>
